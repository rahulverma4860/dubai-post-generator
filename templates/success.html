<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Payment Successful — DubaiPostAI</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #06091a;
            color: #e8e0d0;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #0d1226;
            border: 1px solid rgba(201, 168, 76, 0.18);
            border-radius: 20px;
            padding: 48px;
            text-align: center;
            max-width: 440px;
            width: 90%;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            color: #C9A84C;
            margin-bottom: 10px;
        }

        .sub {
            font-size: 14px;
            color: #8a9bb5;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-block;
            padding: 13px 32px;
            background: #C9A84C;
            color: #06091a;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">🎉</div>
        <h1 class="title">Payment Successful!</h1>
        <p class="sub">Your credits have been added. Start generating content right away.</p>
        <a href="/" class="btn">Start Generating →</a>
    </div>
</body>

</html>
